version: '3.8'  # Pode deixar ou remover, ambos funcionam

services:
  mockserver:
    image: mockserver/mockserver:latest
    ports:
      - "9000:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/initializerJson.json
    volumes:
      - ./mockserver-config.json:/config/initializerJson.json

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,s3,sqs,sns
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - localstack-network
    healthcheck:
      test: ["CMD-SHELL", "awslocal dynamodb list-tables || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  localstack-init:
    image: amazon/aws-cli:latest
    container_name: localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    networks:
      - localstack-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Criando tabela DynamoDB 'propose'..."
        
        aws dynamodb create-table \
          --table-name propose \
          --attribute-definitions \
            AttributeName=code,AttributeType=S \
            AttributeName=proposal,AttributeType=S \
            AttributeName=email,AttributeType=S \
            AttributeName=status,AttributeType=S \
            AttributeName=customer,AttributeType=S \
          --key-schema \
            AttributeName=customer,KeyType=HASH \
            AttributeName=proposal,KeyType=RANGE \
          --local-secondary-indexes \
            '[{
              "IndexName": "StatusIndex",
              "KeySchema": [
                {"AttributeName":"proposal","KeyType":"RANGE"},
                {"AttributeName":"status","KeyType":"HASH"}
              ],
              "Projection": {"ProjectionType":"ALL"}
            }]' \
          --global-secondary-indexes \
            '[{
              "IndexName": "CustomerIndex",
              "KeySchema": [
                {"AttributeName":"customer","KeyType":"HASH"}
              ],
              "Projection": {"ProjectionType":"ALL"}
            },
            {
              "IndexName": "EmailIndex",
              "KeySchema": [
                {"AttributeName":"email","KeyType":"HASH"}
              ],
              "Projection": {"ProjectionType":"ALL"}
            }]' \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://localstack:4566 \
          --region us-east-1 && \
        
        echo "✓ Tabela criada com sucesso!" && \
        echo "" && \
        echo "Verificando tabela:" && \
        aws dynamodb describe-table \
          --table-name propose \
          --endpoint-url http://localstack:4566 \
          --region us-east-1 \
          --query 'Table.[TableName,TableStatus,KeySchema,LocalSecondaryIndexes,GlobalSecondaryIndexes]'

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"

  otel-lgtm:
    image: grafana/otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4318:4318"   # OTLP HTTP receiver
      - "4317:4317"   # OTLP gRPC receiver
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  postgres:
    image: 'postgres:15'
    environment:
      - 'POSTGRES_DB=postgres'
      - 'POSTGRES_PASSWORD=root'
      - 'POSTGRES_USER=root'
    ports:
      - '5432:5432'

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    environment:
      - DYNAMO_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "8001:8001"
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - localstack-network

volumes:
  localstack-data:

networks:
  localstack-network:
    driver: bridge